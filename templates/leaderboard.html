<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — NovaLib</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a0a00; --paper: #fef9ec; --yellow: #ffe438;
      --red: #e8132a; --blue: #1952d3; --green: #22a352;
      --border: 3px solid var(--ink); --shadow: 5px 5px 0 var(--ink);
    }
    body { background-color: var(--paper); background-image: radial-gradient(circle, #ddd 1px, transparent 1px); background-size: 22px 22px; font-family: 'Patrick Hand', cursive; color: var(--ink); min-height: 100vh; }

    header { background: var(--yellow); border-bottom: var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 0 var(--ink); }
    .logo { font-family: 'Bangers', cursive; font-size: clamp(1.8rem, 4vw, 3rem); letter-spacing: 4px; color: var(--ink); text-shadow: 3px 3px 0 var(--red); padding: 10px 0; }
    .logo span { color: var(--red); text-shadow: 3px 3px 0 var(--blue); }
    .btn-sm { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 1.5px; padding: 6px 14px; border: var(--border); cursor: pointer; box-shadow: 3px 3px 0 var(--ink); transition: transform .1s, box-shadow .1s; background: var(--ink); color: var(--yellow); text-decoration: none; display: inline-block; }
    .btn-sm:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--ink); }

    .page { max-width: 800px; margin: 36px auto; padding: 0 24px; }
    .page-title { font-family: 'Bangers', cursive; font-size: 3rem; letter-spacing: 4px; color: var(--red); text-shadow: 4px 4px 0 var(--ink); margin-bottom: 6px; }
    .page-subtitle { font-size: 1.1rem; color: #666; margin-bottom: 28px; }

    /* Podium for top 3 */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 36px; }
    .podium-place { text-align: center; display: flex; flex-direction: column; align-items: center; }
    .podium-medal { font-size: 2.5rem; margin-bottom: 8px; }
    .podium-name { font-family: 'Bangers', cursive; font-size: 1.2rem; letter-spacing: 2px; color: var(--ink); margin-bottom: 6px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .podium-score { font-size: .9rem; color: #666; margin-bottom: 8px; }
    .podium-bar { width: 100px; border: var(--border); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-family: 'Bangers', cursive; font-size: 1.5rem; color: var(--ink); }
    .podium-bar.first  { height: 120px; background: var(--yellow); }
    .podium-bar.second { height: 90px;  background: #e0e0e0; }
    .podium-bar.third  { height: 70px;  background: #f4a460; }

    /* Leaderboard table */
    .leaderboard-table { width: 100%; border-collapse: collapse; border: var(--border); box-shadow: 5px 5px 0 var(--ink); background: #fff9f0; }
    .leaderboard-table th { background: var(--blue); color: var(--yellow); font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 2px; padding: 12px 16px; text-align: left; border-bottom: var(--border); }
    .leaderboard-table td { padding: 12px 16px; border-bottom: 2px solid #e8e0cc; font-size: 1rem; }
    .leaderboard-table tr:last-child td { border-bottom: none; }
    .leaderboard-table tr:hover td { background: #fff3c4; }
    .leaderboard-table tr.current-user td { background: #fff3c4; font-weight: bold; }

    .rank-cell { font-family: 'Bangers', cursive; font-size: 1.3rem; color: var(--blue); width: 50px; }
    .rank-1 { color: #FFD700; }
    .rank-2 { color: #C0C0C0; }
    .rank-3 { color: #CD7F32; }

    .username-cell { font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 1px; }
    .you-badge { background: var(--red); color: #fff; font-family: 'Bangers', cursive; font-size: .7rem; letter-spacing: 1px; padding: 2px 6px; border: 2px solid var(--ink); margin-left: 8px; transform: rotate(-2deg); display: inline-block; }

    .stories-cell { color: var(--blue); font-weight: bold; }
    .achievements-cell { color: var(--green); font-weight: bold; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .big-emoji { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Bangers', cursive; font-size: 2rem; letter-spacing: 3px; margin-bottom: 8px; }
    .empty-state p { color: #888; }

    /* Loading */
    .loading-dots span { display: inline-block; animation: bounce .6s infinite alternate; }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { to { transform: translateY(-6px); } }

    footer { text-align: center; padding: 20px; font-size: .85rem; color: #888; border-top: 2px dashed #ccc; margin-top: 32px; }
    footer a { color: var(--blue); text-decoration: none; font-weight: bold; }

    /* Animate rows in */
    .leaderboard-table tbody tr { animation: slideIn .3s ease both; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>

<header>
  <div class="logo">✦ Nova<span>Lib</span> ✦</div>
  <a href="/" class="btn-sm">◀ BACK TO GAME</a>
</header>

<div class="page">
  <div class="page-title">🏆 LEADERBOARD</div>
  <div class="page-subtitle" id="pageSubtitle">Loading players...</div>

  <!-- Podium for top 3 -->
  <div class="podium" id="podium" style="display:none"></div>

  <!-- Full table -->
  <div id="tableContainer">
    <div style="text-align:center;padding:40px" class="loading-dots">
      <span>●</span><span>●</span><span>●</span>
    </div>
  </div>
</div>

<footer>
  <a href="/">◀ Back to game</a> &nbsp;|&nbsp;
  <a href="/achievements">🏅 Achievements</a> &nbsp;|&nbsp;
  <a href="/history">📜 My Stories</a>
</footer>

<script>
  async function load() {
    const [meRes, lbRes] = await Promise.all([
      fetch('/api/me'),
      fetch('/api/leaderboard')
    ]);
    const me   = await meRes.json();
    const data = await lbRes.json();

    const currentUsername = me.user ? me.user.username : null;

    document.getElementById('pageSubtitle').textContent =
      `${data.length} player${data.length !== 1 ? 's' : ''} ranked by stories played`;

    // Build podium for top 3
    if (data.length >= 1) {
      const podium  = document.getElementById('podium');
      podium.style.display = 'flex';
      const medals  = ['🥇', '🥈', '🥉'];
      const classes = ['first', 'second', 'third'];
      const order   = data.length >= 3 ? [1, 0, 2] : data.length === 2 ? [1, 0] : [0];

      order.forEach(idx => {
        if (!data[idx]) return;
        const p    = data[idx];
        const div  = document.createElement('div');
        div.className = 'podium-place';
        div.innerHTML = `
          <div class="podium-medal">${medals[idx] || ''}</div>
          <div class="podium-name">${escHtml(p.username)}${p.username === currentUsername ? ' 👈' : ''}</div>
          <div class="podium-score">${p.stories_played} stories</div>
          <div class="podium-bar ${classes[idx]}">#${idx + 1}</div>
        `;
        podium.appendChild(div);
      });
    }

    // Build table
    const container = document.getElementById('tableContainer');
    if (data.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="big-emoji">🎮</div>
          <h3>NO PLAYERS YET!</h3>
          <p>Be the first to play and appear on the leaderboard!</p>
        </div>`;
      return;
    }

    const table = document.createElement('table');
    table.className = 'leaderboard-table';
    table.innerHTML = `
      <thead>
        <tr>
          <th>RANK</th>
          <th>PLAYER</th>
          <th>📖 STORIES</th>
          <th>🏅 BADGES</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    `;
    container.innerHTML = '';
    container.appendChild(table);

    const tbody = document.getElementById('tableBody');
    data.forEach((player, i) => {
      const tr = document.createElement('tr');
      tr.style.animationDelay = `${i * 40}ms`;
      if (player.username === currentUsername) tr.classList.add('current-user');

      const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
      const youBadge  = player.username === currentUsername ? '<span class="you-badge">YOU</span>' : '';

      tr.innerHTML = `
        <td class="rank-cell ${rankClass}">#${player.rank}</td>
        <td class="username-cell">${escHtml(player.username)}${youBadge}</td>
        <td class="stories-cell">${player.stories_played}</td>
        <td class="achievements-cell">${player.achievements_earned}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
