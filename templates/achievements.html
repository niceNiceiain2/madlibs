<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achievements — Mad Libs!</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a0a00; --paper: #fef9ec; --yellow: #ffe438;
      --red: #e8132a; --blue: #1952d3; --green: #22a352;
      --border: 3px solid var(--ink); --shadow: 5px 5px 0 var(--ink);
    }
    body { background-color: var(--paper); background-image: radial-gradient(circle, #ddd 1px, transparent 1px); background-size: 22px 22px; font-family: 'Patrick Hand', cursive; color: var(--ink); min-height: 100vh; }

    header { background: var(--yellow); border-bottom: var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 0 var(--ink); }
    .logo { font-family: 'Bangers', cursive; font-size: clamp(1.8rem, 4vw, 3rem); letter-spacing: 4px; color: var(--ink); text-shadow: 3px 3px 0 var(--red); padding: 10px 0; }
    .logo span { color: var(--red); text-shadow: 3px 3px 0 var(--blue); }
    .btn-sm { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 1.5px; padding: 6px 14px; border: var(--border); cursor: pointer; box-shadow: 3px 3px 0 var(--ink); transition: transform .1s, box-shadow .1s; background: var(--ink); color: var(--yellow); text-decoration: none; display: inline-block; }
    .btn-sm:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--ink); }

    .page { max-width: 1000px; margin: 36px auto; padding: 0 24px; }

    .page-title { font-family: 'Bangers', cursive; font-size: 3rem; letter-spacing: 4px; color: var(--red); text-shadow: 4px 4px 0 var(--ink); margin-bottom: 6px; }
    .page-subtitle { font-size: 1.1rem; color: #666; margin-bottom: 8px; }

    .stats-bar { background: var(--blue); border: var(--border); box-shadow: var(--shadow); padding: 14px 24px; margin-bottom: 28px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num  { font-family: 'Bangers', cursive; font-size: 2rem; color: var(--yellow); letter-spacing: 2px; line-height: 1; }
    .stat-label { font-size: .85rem; color: #aac4ff; letter-spacing: 1px; }

    /* Progress bar */
    .progress-wrap { flex: 1; min-width: 180px; }
    .progress-label { font-family: 'Bangers', cursive; font-size: 1rem; color: var(--yellow); letter-spacing: 1px; margin-bottom: 6px; }
    .progress-track { background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.3); height: 18px; border-radius: 0; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--yellow); transition: width .8s cubic-bezier(.36,.07,.19,.97); }

    /* Category */
    .category { margin-bottom: 32px; }
    .cat-title { font-family: 'Bangers', cursive; font-size: 1.6rem; letter-spacing: 3px; color: var(--ink); border-bottom: var(--border); padding-bottom: 6px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }

    /* Grid */
    .badges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    .badge-card { background: var(--paper); border: var(--border); box-shadow: var(--shadow); padding: 18px; text-align: center; position: relative; transition: transform .15s, box-shadow .15s; }
    .badge-card.earned { background: #fffde8; }
    .badge-card.locked { background: #f0ece0; opacity: .65; filter: grayscale(.4); }
    .badge-card.earned:hover { transform: translate(-3px,-3px); box-shadow: 8px 8px 0 var(--ink); }

    .badge-emoji { font-size: 2.6rem; margin-bottom: 8px; display: block; transition: transform .2s; }
    .badge-card.earned:hover .badge-emoji { transform: scale(1.2) rotate(-5deg); }
    .badge-card.locked .badge-emoji { filter: grayscale(1); }

    .badge-name { font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 1.5px; color: var(--ink); margin-bottom: 4px; }
    .badge-desc { font-size: .82rem; color: #888; line-height: 1.4; }
    .badge-secret .badge-desc { color: #aaa; font-style: italic; }

    .earned-stamp { position: absolute; top: 8px; right: 8px; background: var(--green); color: #fff; font-family: 'Bangers', cursive; font-size: .7rem; letter-spacing: 1px; padding: 2px 6px; border: 2px solid var(--ink); transform: rotate(3deg); }
    .earned-date  { font-size: .7rem; color: #aaa; margin-top: 6px; }

    .locked-icon { position: absolute; top: 8px; right: 8px; font-size: 1rem; opacity: .4; }

    footer { text-align: center; padding: 20px; font-size: .85rem; color: #888; border-top: 2px dashed #ccc; margin-top: 20px; }
    footer a { color: var(--blue); }

    .not-logged-in { background: var(--yellow); border: var(--border); box-shadow: var(--shadow); padding: 24px 32px; text-align: center; margin-bottom: 28px; }
    .not-logged-in h3 { font-family: 'Bangers', cursive; font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 8px; }
    .not-logged-in p { font-size: .95rem; color: #555; }
  </style>
</head>
<body>

<header>
  <div class="logo">✦ Mad <span>Libs!</span> ✦</div>
  <a href="/" class="btn-sm">◀ BACK TO GAME</a>
</header>

<div class="page">
  <div class="page-title">🏅 ACHIEVEMENTS</div>
  <div class="page-subtitle" id="pageSubtitle">Loading...</div>

  <div id="notLoggedIn" style="display:none" class="not-logged-in">
    <h3>⚠️ NOT LOGGED IN</h3>
    <p>Go back and log in to track your achievements!</p>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat">
      <div class="stat-num" id="statEarned">0</div>
      <div class="stat-label">EARNED</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">TOTAL</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statStories">0</div>
      <div class="stat-label">STORIES PLAYED</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel">0 / 0 UNLOCKED</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="achievementsContainer"></div>
</div>

<footer><a href="/">◀ Back to game</a></footer>

<script>
  async function load() {
    const [meRes, achRes, statRes] = await Promise.all([
      fetch('/api/me'), fetch('/api/achievements'), fetch('/api/stats')
    ]);
    const me    = await meRes.json();
    const ach   = await achRes.json();
    const stats = await statRes.json();

    const earned = ach.earned;
    const all    = ach.achievements;
    const earnedCount = Object.keys(earned).length;

    if (!me.user) {
      document.getElementById('notLoggedIn').style.display = 'block';
      document.getElementById('pageSubtitle').textContent  = 'Log in to track your progress';
    } else {
      document.getElementById('statsBar').style.display = 'flex';
      document.getElementById('pageSubtitle').textContent = `Welcome, ${me.user.username}!`;
      document.getElementById('statEarned').textContent  = earnedCount;
      document.getElementById('statTotal').textContent   = all.length;
      document.getElementById('statStories').textContent = stats.stories_played;
      const pct = Math.round(earnedCount / all.length * 100);
      document.getElementById('progressLabel').textContent = `${earnedCount} / ${all.length} UNLOCKED`;
      setTimeout(() => document.getElementById('progressFill').style.width = pct + '%', 100);
    }

    // Split into categories
    const wordBased  = all.filter(a => !['first_story','5_stories','10_stories','all_stories','food_frenzy'].includes(a.id));
    const milestones = all.filter(a => ['first_story','5_stories','10_stories','all_stories'].includes(a.id));
    const combos     = all.filter(a => a.id === 'food_frenzy');

    const container = document.getElementById('achievementsContainer');
    container.appendChild(buildCategory('🔤 WORD CHOICES', wordBased,  earned));
    container.appendChild(buildCategory('📈 MILESTONES',   milestones, earned));
    container.appendChild(buildCategory('🔥 COMBOS',       combos,     earned));
  }

  function buildCategory(title, achievements, earned) {
    const cat = document.createElement('div');
    cat.className = 'category';
    cat.innerHTML = `<div class="cat-title">${title}</div>`;
    const grid = document.createElement('div');
    grid.className = 'badges-grid';
    achievements.forEach(a => {
      const isEarned = !!earned[a.id];
      const card = document.createElement('div');
      card.className = 'badge-card ' + (isEarned ? 'earned' : 'locked') + (a.secret && !isEarned ? ' badge-secret' : '');
      const earnedDate = earned[a.id] ? new Date(earned[a.id]).toLocaleDateString() : null;
      card.innerHTML = `
        ${isEarned ? '<div class="earned-stamp">✓ EARNED</div>' : '<div class="locked-icon">🔒</div>'}
        <span class="badge-emoji">${a.emoji}</span>
        <div class="badge-name">${escHtml(a.name)}</div>
        <div class="badge-desc">${a.secret && !isEarned ? '??? Secret achievement ???' : escHtml(a.desc)}</div>
        ${earnedDate ? `<div class="earned-date">${earnedDate}</div>` : ''}
      `;
      grid.appendChild(card);
    });
    cat.appendChild(grid);
    return cat;
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
